services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TIME_ZONE}
    volumes:
      - ${HOST_POSTGRES_DATA}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - calidad-internal

  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/backend.Dockerfile
    restart: unless-stopped
    environment:
      APP_SLUG: ${APP_SLUG}
      PUBLIC_HOSTNAME: ${PUBLIC_HOSTNAME}
      FRONTEND_BIND_PORT: ${FRONTEND_BIND_PORT}
      FRONTEND_TLS_BIND_PORT: ${FRONTEND_TLS_BIND_PORT}
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_CONN_MAX_AGE: ${POSTGRES_CONN_MAX_AGE}
      LANGUAGE_CODE: ${LANGUAGE_CODE}
      TIME_ZONE: ${TIME_ZONE}
      LOG_LEVEL: ${LOG_LEVEL}
      DJANGO_LOG_TO_FILE: ${DJANGO_LOG_TO_FILE}
      APP_LOG_FILE: ${APP_LOG_FILE}
      CORS_ALLOW_ALL_ORIGINS: ${CORS_ALLOW_ALL_ORIGINS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CORS_ALLOWED_ORIGIN_REGEXES: ${CORS_ALLOWED_ORIGIN_REGEXES}
      STORAGE_ROOT: ${STORAGE_ROOT}
      MEDIA_ROOT: ${MEDIA_ROOT}
      TEMP_FILES_ROOT: ${TEMP_FILES_ROOT}
      STATIC_ROOT: ${STATIC_ROOT}
      LOG_DIR: ${LOG_DIR}
      FILE_UPLOAD_MAX_MEMORY_SIZE: ${FILE_UPLOAD_MAX_MEMORY_SIZE}
      DATA_UPLOAD_MAX_MEMORY_SIZE: ${DATA_UPLOAD_MAX_MEMORY_SIZE}
      LAST_ACTIVITY_UPDATE_WINDOW_SECONDS: ${LAST_ACTIVITY_UPDATE_WINDOW_SECONDS}
      JWT_ACCESS_TOKEN_MINUTES: ${JWT_ACCESS_TOKEN_MINUTES}
      JWT_REFRESH_TOKEN_MINUTES: ${JWT_REFRESH_TOKEN_MINUTES}
      DRF_ANON_RATE: ${DRF_ANON_RATE}
      DRF_USER_RATE: ${DRF_USER_RATE}
      DRF_LOGIN_RATE: ${DRF_LOGIN_RATE}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS}
    command: >-
      sh -c "python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS} --timeout ${GUNICORN_TIMEOUT}"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ${HOST_MEDIA_ROOT}:/srv/calidad/storage/media
      - ${HOST_TMP_ROOT}:/srv/calidad/storage/tmp
      - ${HOST_STATIC_ROOT}:/srv/calidad/runtime/staticfiles
      - ${HOST_LOG_ROOT}:/srv/calidad/runtime/logs
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/core/health/')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - calidad-internal

  frontend:
    build:
      context: ../..
      dockerfile: deploy/docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_CATALOG_BOOTSTRAP_URL: /catalog.bootstrap.json
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      TLS_COMMON_NAME: ${PUBLIC_HOSTNAME}
      TLS_CERT_DAYS: ${TLS_CERT_DAYS}
      TLS_SAN: ${TLS_SAN}
      TLS_CERT_FILE: /etc/nginx/certs/local.crt
      TLS_KEY_FILE: /etc/nginx/certs/local.key
    ports:
      - target: 80
        published: "${FRONTEND_BIND_PORT}"
        host_ip: 0.0.0.0
        protocol: tcp
      - target: 443
        published: "${FRONTEND_TLS_BIND_PORT}"
        host_ip: 0.0.0.0
        protocol: tcp
    volumes:
      - ${HOST_MEDIA_ROOT}:/var/www/calidad/media:ro
      - ${HOST_STATIC_ROOT}:/var/www/calidad/static:ro
      - ${HOST_TLS_CERTS}:/etc/nginx/certs
    networks:
      - calidad-internal

networks:
  calidad-internal:
    driver: bridge
